<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ ui_label }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>
  <main class="screen-shell" id="scrollRoot">
    <article class="hero-card" id="heroCard">
      <div class="hero-banner">
        <div class="hero-icon" id="heroIcon" aria-hidden="true">✓</div>
        <h1 id="heading" class="hero-title">Available</h1>
      </div>

      <section id="listSection" class="event-section">
        <div class="event-card">
          <div class="event-header">
            <span class="event-label">UP NEXT</span>
            <span class="event-badge" id="eventBadge">in 45m</span>
          </div>
          <h2 id="eventTitle" class="event-title">Product Alignment</h2>
          <div class="event-meta">
            <span class="event-time" id="eventRange">03:30 PM — 04:30 PM</span>
          </div>
        </div>
        <div id="upcomingList" class="upcoming-list hidden"></div>
      </section>
    </article>
  </main>

  <template id="upcomingTemplate">
    <article class="upcoming-item">
      <div class="date-pill">
        <div class="date-month"></div>
        <div class="date-day"></div>
      </div>
      <div class="upcoming-copy">
        <div class="upcoming-title"></div>
        <div class="upcoming-range"></div>
        <div class="upcoming-subtitle"></div>
      </div>
      <div class="upcoming-tail" aria-hidden="true">›</div>
    </article>
  </template>

  <script>
    window.APP_BOOTSTRAP = {
      connectedProvider: new URLSearchParams(window.location.search).get('connected'),
    };
  </script>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>

</html>
