# GitHub Actions workflow to deploy the auth_server (Azure Functions) to Azure.
#
# Required GitHub secrets:
#   AZURE_CLIENT_ID       - Service principal client ID
#   AZURE_CLIENT_SECRET   - Service principal client secret
#   AZURE_TENANT_ID       - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID - Azure subscription ID
#
# Required GitHub variables (or replace placeholders below):
#   AZURE_RESOURCE_GROUP  - Azure resource group name
#   AZURE_FUNCTION_APP    - Azure Function App name
#
# Sensitive app settings that must be stored as GitHub secrets:
#   APP_SECRET_KEY              - Random secret key for the app
#   AZURE_STORAGE_CONNECTION_STRING - Azure Storage connection string
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   MICROSOFT_CLIENT_ID
#   MICROSOFT_CLIENT_SECRET
#   ZOOM_CLIENT_ID
#   ZOOM_CLIENT_SECRET

name: Deploy Auth Server to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # --- Placeholders: replace or store as GitHub variables/secrets ---
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || '<YOUR_RESOURCE_GROUP>' }}
  AZURE_FUNCTION_APP:   ${{ vars.AZURE_FUNCTION_APP   || '<YOUR_FUNCTION_APP_NAME>' }}
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    environment: dev
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC login (optional; remove if using client secret)
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name:       ${{ env.AZURE_FUNCTION_APP }}
          package:        .
          scm-do-build-during-deployment: false
          enable-oryx-build:              false

      # ---------------------------------------------------------------------------
      # Configure application settings from .env.example
      # Sensitive values are read from GitHub secrets; non-sensitive ones are
      # set inline. Adjust the values below to match your environment.
      # ---------------------------------------------------------------------------
      - name: Configure Azure Function App settings
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp config appsettings set \
              --subscription  "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name          "${{ env.AZURE_FUNCTION_APP }}" \
              --settings \
                APP_BASE_URL="https://${{ env.AZURE_FUNCTION_APP }}.azurewebsites.net" \
                APP_TIMEZONE="America/Chicago" \
                APP_SECRET_KEY="${{ secrets.APP_SECRET_KEY }}" \
                LOOKAHEAD_HOURS="12" \
                REFRESH_SECONDS="30" \
                MOCK_DATA_MODE="0" \
                TOKEN_STORE_BACKEND="azure_blob" \
                TOKEN_STORE_PATH="data/tokens.json" \
                AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
                TOKEN_STORE_CONTAINER="chronopi" \
                TOKEN_STORE_BLOB="tokens.json" \
                GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
                GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                GOOGLE_CALENDAR_ID="primary" \
                MICROSOFT_CLIENT_ID="${{ secrets.MICROSOFT_CLIENT_ID }}" \
                MICROSOFT_CLIENT_SECRET="${{ secrets.MICROSOFT_CLIENT_SECRET }}" \
                MICROSOFT_TENANT_ID="common" \
                ZOOM_CLIENT_ID="${{ secrets.ZOOM_CLIENT_ID }}" \
                ZOOM_CLIENT_SECRET="${{ secrets.ZOOM_CLIENT_SECRET }}" \
                UI_LABEL="Chronopi" \
                UI_SUBLABEL="Home Office" \
                UI_THEME="dark"
